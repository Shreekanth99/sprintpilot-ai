name: CI

on:
push:
branches:
- main
pull_request:

jobs:
test:
runs-on: ubuntu-latest

```
services:
  postgres:
    image: postgres:16
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sprintpilot_test
    ports:
      - 5432:5432

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Ruby
    uses: ruby/setup-ruby@v1
    with:
      bundler-cache: true

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: Install dependencies
    run: |
      bundle install
      npm install

  - name: Build CSS
    run: npm run build:css

  - name: Prepare database
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sprintpilot_test
    run: |
      bin/rails db:create
      bin/rails db:schema:load

  - name: Run tests
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sprintpilot_test
    run: bin/rails test
```
